<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Certificate & Ultra-Glass PDF Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* Intense high-contrast ambient backdrop mesh */
        body {
            background-color: #090d16;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 64, 175, 0.45) 0px, transparent 55%),
                radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.25) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(29, 78, 216, 0.3) 0px, transparent 55%),
                radial-gradient(at 50% 50%, rgba(99, 102, 241, 0.15) 0px, transparent 40%),
                radial-gradient(at 0% 100%, rgba(124, 58, 237, 0.35) 0px, transparent 50%);
        }
    </style>
</head>
<body class="font-sans min-h-screen p-6 flex flex-col items-center justify-center text-white/90">

    <div class="bg-white/15 backdrop-blur-xl border border-white/20 p-8 rounded-3xl shadow-[0_25px_50px_-12px_rgba(0,0,0,0.7)] w-full max-w-7xl grid grid-cols-1 lg:grid-cols-12 gap-8 transition-all duration-300">
        
        <div class="lg:col-span-4 space-y-5">
            <div>
                <h1 class="text-2xl font-black text-white tracking-tight">Bulk Certificate Generator</h1>
                <p class="text-xs text-emerald-400 font-semibold tracking-wider mt-0.5 uppercase">Premium Acrylic UI • High-Speed JPEG Engine</p>
            </div>

            <form id="uploadForm" class="space-y-4" onsubmit="return false;">
                <div class="group">
                    <label class="block text-xs font-bold text-gray-300 uppercase tracking-wide mb-1 transition-colors group-hover:text-blue-400">Certificate Template (Image)</label>
                    <input type="file" id="imageInput" accept="image/*" required
                        class="block w-full text-xs text-gray-400 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-blue-500/20 file:text-blue-200 hover:file:bg-blue-500/30 border border-white/10 bg-white/5 rounded-xl p-1.5 shadow-inner hover:border-blue-500/40 hover:bg-white/10 transition-all duration-200">
                </div>

                <div class="group">
                    <label class="block text-xs font-bold text-gray-300 uppercase tracking-wide mb-1 transition-colors group-hover:text-blue-400">Custom Font (.ttf)</label>
                    <input type="file" id="fontInput" accept=".ttf" required
                        class="block w-full text-xs text-gray-400 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-blue-500/20 file:text-blue-200 hover:file:bg-blue-500/30 border border-white/10 bg-white/5 rounded-xl p-1.5 shadow-inner hover:border-blue-500/40 hover:bg-white/10 transition-all duration-200">
                </div>

                <div class="group">
                    <label class="block text-xs font-bold text-gray-300 uppercase tracking-wide mb-1 transition-colors group-hover:text-blue-400">Data Sheet (.xlsx, .csv)</label>
                    <input type="file" id="dataInput" accept=".xlsx, .csv" required
                        class="block w-full text-xs text-gray-400 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-blue-500/20 file:text-blue-200 hover:file:bg-blue-500/30 border border-white/10 bg-white/5 rounded-xl p-1.5 shadow-inner hover:border-blue-500/40 hover:bg-white/10 transition-all duration-200">
                    <div id="rowCountFeedback" class="text-xs text-amber-400 mt-1.5 font-bold tracking-wide"></div>
                </div>

                <hr class="border-white/10">

                <div class="bg-black/20 border border-white/10 p-4 rounded-2xl space-y-3 shadow-inner">
                    <h3 class="text-xs font-bold text-gray-200 uppercase tracking-wide flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 bg-blue-400 rounded-full animate-pulse"></span>Configuration Values
                    </h3>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[11px] font-bold text-gray-400 mb-0.5">X Position</label>
                            <input type="number" id="posX" value="100" class="w-full p-1.5 bg-white/10 border border-white/10 rounded-lg text-sm text-center text-white focus:bg-black/40 focus:border-blue-500/80 outline-none transition-all duration-150">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-gray-400 mb-0.5">Y Position</label>
                            <input type="number" id="posY" value="100" class="w-full p-1.5 bg-white/10 border border-white/10 rounded-lg text-sm text-center text-white focus:bg-black/40 focus:border-blue-500/80 outline-none transition-all duration-150">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-2 pt-0.5">
                        <button type="button" onclick="centerAxis('X')" class="py-1.5 px-2 bg-blue-600/80 hover:bg-blue-600 active:scale-95 text-white font-bold rounded-xl text-xs transition-all duration-150 text-center shadow-md border border-blue-400/20">
                            ↔ Center Horiz
                        </button>
                        <button type="button" onclick="centerAxis('Y')" class="py-1.5 px-2 bg-blue-600/80 hover:bg-blue-600 active:scale-95 text-white font-bold rounded-xl text-xs transition-all duration-150 text-center shadow-md border border-blue-400/20">
                            ↕ Center Vert
                        </button>
                    </div>

                    <div class="grid grid-cols-2 gap-3 pt-1">
                        <div>
                            <label class="block text-[11px] font-bold text-gray-400 mb-0.5">Font Size (px)</label>
                            <input type="number" id="fontSize" value="300" class="w-full p-1.5 bg-white/10 border border-white/10 rounded-lg text-sm text-center text-white focus:bg-black/40 focus:border-blue-500/80 outline-none transition-all duration-150">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-gray-400 mb-0.5">Final Font Color</label>
                            <input type="color" id="fontColor" value="#1e3a8a" class="w-full h-9 p-1 bg-white/10 border border-white/10 rounded-lg cursor-pointer hover:scale-[1.04] transition-transform duration-150">
                        </div>
                    </div>

                    <div class="pt-1">
                        <div class="flex justify-center space-x-1">
                            <button type="button" onclick="nudge('X', -5)" class="px-3 py-1.5 bg-white/5 hover:bg-blue-500/80 text-white active:scale-90 border border-white/10 rounded-lg text-xs font-bold transition-all duration-150">⬅ L</button>
                            <button type="button" onclick="nudge('X', 5)" class="px-3 py-1.5 bg-white/5 hover:bg-blue-500/80 text-white active:scale-90 border border-white/10 rounded-lg text-xs font-bold transition-all duration-150">R ➡</button>
                            <button type="button" onclick="nudge('Y', -5)" class="px-3 py-1.5 bg-white/5 hover:bg-blue-500/80 text-white active:scale-90 border border-white/10 rounded-lg text-xs font-bold transition-all duration-150">⬆ U</button>
                            <button type="button" onclick="nudge('Y', 5)" class="px-3 py-1.5 bg-white/5 hover:bg-blue-500/80 text-white active:scale-90 border border-white/10 rounded-lg text-xs font-bold transition-all duration-150">D ⬇</button>
                        </div>
                    </div>
                </div>

                <div class="bg-black/20 border border-white/10 p-4 rounded-2xl space-y-1 shadow-inner">
                    <label class="block text-xs font-bold text-gray-300 uppercase tracking-wide">Export File Name</label>
                    <input type="text" id="outputFileName" placeholder="e.g., cse_fest_certificates" 
                        class="w-full p-2.5 border border-white/10 rounded-xl text-xs focus:ring-2 focus:ring-blue-500/30 focus:bg-black/30 outline-none bg-white/5 text-white transition-all duration-200">
                    <span class="text-[10px] text-gray-400 block mt-0.5 font-medium">Extension (.pdf/.zip) will be appended automatically.</span>
                </div>

                <div class="grid grid-cols-1 gap-2 pt-1">
                    <button type="button" id="generateZipBtn" onclick="startGenerationPipeline('zip')"
                        class="w-full bg-blue-600 hover:bg-blue-500 active:scale-[0.98] text-white font-extrabold py-3 px-4 rounded-2xl transition-all duration-200 shadow-lg hover:shadow-blue-500/20 hover:scale-[1.01] text-xs border border-blue-400/30">
                        Download Individual Images (ZIP)
                    </button>
                    <button type="button" id="generatePdfBtn" onclick="startGenerationPipeline('pdf')"
                        class="w-full bg-emerald-600 hover:bg-emerald-500 active:scale-[0.98] text-white font-extrabold py-3 px-4 rounded-2xl transition-all duration-200 shadow-lg hover:shadow-emerald-500/20 hover:scale-[1.01] text-xs border border-emerald-400/30">
                        Download Single Unified PDF
                    </button>
                </div>
            </form>

            <div id="status" class="text-center text-xs font-bold hidden p-3 rounded-2xl transition-all duration-200"></div>
        </div>

        <div class="lg:col-span-8 flex flex-col items-center justify-between border border-white/10 rounded-3xl p-4 bg-black/10 shadow-inner min-h-[520px]">
            
            <span id="previewPlaceholder" class="text-gray-400 font-medium text-sm my-auto tracking-wide drop-shadow-sm">Upload your template image background to initiate editor.</span>
            
            <div id="canvasContainer" class="hidden relative max-w-full shadow-[0_20px_40px_rgba(0,0,0,0.5)] rounded-xl overflow-hidden bg-white select-none my-auto transition-all duration-300">
                <canvas id="previewCanvas" class="max-w-full h-auto block cursor-crosshair"></canvas>
            </div>

            <div id="navigationPanel" class="w-full max-w-md bg-white/10 backdrop-blur-md border border-white/10 p-3 rounded-2xl shadow-xl flex items-center justify-between hidden mt-4 transition-all duration-200">
                <button type="button" id="prevDataBtn" onclick="changeRecord(-1)" 
                    class="px-3 py-2 bg-white/5 text-white hover:bg-blue-600 active:scale-95 disabled:opacity-30 disabled:hover:bg-white/5 disabled:cursor-not-allowed rounded-xl text-xs font-bold transition-all duration-150 border border-white/5">
                    ◀ Prev
                </button>
                <div class="text-center px-2">
                    <div id="recordCounter" class="text-xs font-black text-white tracking-wide">Viewing Dummy Placeholder</div>
                    <div id="recordNameDisplay" class="text-[11px] text-amber-400 font-bold italic max-w-[180px] truncate mt-0.5">No sheet uploaded</div>
                </div>
                <button type="button" id="nextDataBtn" onclick="changeRecord(1)" 
                    class="px-3 py-2 bg-white/5 text-white hover:bg-blue-600 active:scale-95 disabled:opacity-30 disabled:hover:bg-white/5 disabled:cursor-not-allowed rounded-xl text-xs font-bold transition-all duration-150 border border-white/5">
                    Next ▶
                </button>
            </div>

        </div>

    </div>

    <script>
        let templateImage = null;
        let customFontName = "CustomFont";
        let finalRecipientNames = [];
        let fontLoaded = false;
        
        let activeRecordIndex = -1;
        let isDragging = false;
        let textBoxRegion = { x1: 0, y1: 0, x2: 0, y2: 0 };

        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        const canvasContainer = document.getElementById('canvasContainer');
        const previewPlaceholder = document.getElementById('previewPlaceholder');

        const imageInput = document.getElementById('imageInput');
        const fontInput = document.getElementById('fontInput');
        const dataInput = document.getElementById('dataInput');
        const posXInput = document.getElementById('posX');
        const posYInput = document.getElementById('posY');
        const fontSizeInput = document.getElementById('fontSize');
        const fontColorInput = document.getElementById('fontColor');
        const rowCountFeedback = document.getElementById('rowCountFeedback');
        const outputFileNameInput = document.getElementById('outputFileName');
        
        const navigationPanel = document.getElementById('navigationPanel');
        const recordCounter = document.getElementById('recordCounter');
        const recordNameDisplay = document.getElementById('recordNameDisplay');
        const prevDataBtn = document.getElementById('prevDataBtn');
        const nextDataBtn = document.getElementById('nextDataBtn');

        [posXInput, posYInput, fontSizeInput, fontColorInput].forEach(input => {
            input.addEventListener('input', drawPreview);
        });

        function sanitizeText(str) {
            return String(str)
                .trim()
                .replace(/\./g, '․')    
                .replace(/\(/g, '（')    
                .replace(/\)/g, '）');   
        }

        // 1. Load Certificate Template Image
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                templateImage = new Image();
                templateImage.onload = function() {
                    canvas.width = templateImage.width;
                    canvas.height = templateImage.height;
                    
                    posXInput.value = Math.round(templateImage.width / 2);
                    posYInput.value = Math.round(templateImage.height / 2);

                    previewPlaceholder.classList.add('hidden');
                    canvasContainer.classList.remove('hidden');
                    navigationPanel.classList.remove('hidden');
                    drawPreview();
                }
                templateImage.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // 2. Load TTF Font
        fontInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(event) {
                try {
                    const fontData = event.target.result;
                    const font = new FontFace(customFontName, fontData);
                    const loadedFont = await font.load();
                    document.fonts.add(loadedFont);
                    fontLoaded = true;
                    drawPreview();
                } catch (err) {
                    alert("Failed to load your font file. Make sure it is a proper .ttf format.");
                }
            }
            reader.readAsArrayBuffer(file);
        });

        // 3. Process Excel / CSV
        dataInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                
                const rawRows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                finalRecipientNames = [];
                let nameColumnIndex = -1;

                if(rawRows.length > 0) {
                    const firstRow = rawRows[0];
                    for(let c = 0; c < firstRow.length; c++) {
                        if(firstRow[c] && String(firstRow[c]).trim().toLowerCase() === 'name') {
                            nameColumnIndex = c;
                            break;
                        }
                    }

                    if(nameColumnIndex === -1) nameColumnIndex = 0;

                    for(let r = 1; r < rawRows.length; r++) {
                        const cellValue = rawRows[r][nameColumnIndex];
                        if(cellValue !== undefined && cellValue !== null && String(cellValue).trim() !== "") {
                            finalRecipientNames.push(String(cellValue).trim());
                        }
                    }
                }
                rowCountFeedback.innerText = `Total Recipient Records Linked: ${finalRecipientNames.length}`;
                
                if (finalRecipientNames.length > 0) {
                    activeRecordIndex = 0;
                } else {
                    activeRecordIndex = -1;
                }
                updateNavigationUI();
                drawPreview();
            }
            reader.readAsArrayBuffer(file);
        });

        // REALTIME DATA PAGINATION CONTROLLER
        function changeRecord(direction) {
            if (finalRecipientNames.length === 0) return;
            
            activeRecordIndex += direction;
            
            if (activeRecordIndex < 0) activeRecordIndex = 0;
            if (activeRecordIndex >= finalRecipientNames.length) activeRecordIndex = finalRecipientNames.length - 1;
            
            updateNavigationUI();
            drawPreview();
        }

        function updateNavigationUI() {
            if (activeRecordIndex === -1 || finalRecipientNames.length === 0) {
                recordCounter.innerText = "Viewing Dummy Placeholder";
                recordNameDisplay.innerText = "No data array initialized";
                prevDataBtn.disabled = true;
                nextDataBtn.disabled = true;
                return;
            }

            recordCounter.innerText = `Record ${activeRecordIndex + 1} of ${finalRecipientNames.length}`;
            recordNameDisplay.innerText = finalRecipientNames[activeRecordIndex];

            prevDataBtn.disabled = (activeRecordIndex === 0);
            nextDataBtn.disabled = (activeRecordIndex === finalRecipientNames.length - 1);
        }

        function centerAxis(axis) {
            if (!templateImage) return alert("Please upload a certificate template image first.");
            if (axis === 'X') posXInput.value = Math.round(templateImage.width / 2);
            if (axis === 'Y') posYInput.value = Math.round(templateImage.height / 2);
            drawPreview();
        }

        // MOUSE MAPPING DRAG INTERACTION
        function getCanvasMouseCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        canvas.addEventListener('mousedown', (e) => {
            if (!templateImage) return;
            const coords = getCanvasMouseCoords(e);

            if (coords.x >= textBoxRegion.x1 && coords.x <= textBoxRegion.x2 &&
                coords.y >= textBoxRegion.y1 && coords.y <= textBoxRegion.y2) {
                isDragging = true;
                canvas.style.cursor = 'grabbing';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) {
                if (templateImage) {
                    const coords = getCanvasMouseCoords(e);
                    if (coords.x >= textBoxRegion.x1 && coords.x <= textBoxRegion.x2 &&
                        coords.y >= textBoxRegion.y1 && coords.y <= textBoxRegion.y2) {
                        canvas.style.cursor = 'move';
                    } else {
                        canvas.style.cursor = 'crosshair';
                    }
                }
                return;
            }

            const coords = getCanvasMouseCoords(e);
            posXInput.value = Math.round(coords.x);
            posYInput.value = Math.round(coords.y);
            drawPreview();
        });

        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                canvas.style.cursor = 'move';
            }
        });

        // CORE ENGINE DRAW LOOP
        function drawPreview() {
            if (!templateImage) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(templateImage, 0, 0);

            const x = parseFloat(posXInput.value) || 0;
            const y = parseFloat(posYInput.value) || 0;
            const size = parseFloat(fontSizeInput.value) || 300;
            const chosenColor = fontColorInput.value;

            let targetTextString = "Md. Shahraj Mashrafe Mashfe";
            if (activeRecordIndex !== -1 && finalRecipientNames[activeRecordIndex]) {
                targetTextString = finalRecipientNames[activeRecordIndex];
            }

            const processedText = sanitizeText(targetTextString);

            if (fontLoaded) {
                ctx.font = `${size}px "${customFontName}"`;
            } else {
                ctx.font = `bold ${size}px sans-serif`;
            }
            
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const textWidth = ctx.measureText(processedText).width;
            const paddingX = 40; 
            const paddingY = 20;

            textBoxRegion = {
                x1: x - (textWidth / 2) - paddingX,
                y1: y - (size / 2) - paddingY,
                x2: x + (textWidth / 2) + paddingX,
                y2: y + (size / 2) + paddingY
            };

            ctx.fillStyle = 'rgba(59, 130, 246, 0.12)';
            ctx.fillRect(textBoxRegion.x1, textBoxRegion.y1, textBoxRegion.x2 - textBoxRegion.x1, textBoxRegion.y2 - textBoxRegion.y1);
            ctx.strokeStyle = '#60a5fa';
            ctx.lineWidth = Math.max(2, Math.round(size / 60)); 

            ctx.strokeRect(textBoxRegion.x1, textBoxRegion.y1, textBoxRegion.x2 - textBoxRegion.x1, textBoxRegion.y2 - textBoxRegion.y1);

            ctx.fillStyle = fontLoaded ? chosenColor : '#60a5fa';
            ctx.fillText(processedText, x, y);
        }

        function nudge(axis, amount) {
            const input = axis === 'X' ? posXInput : posYInput;
            input.value = parseInt(input.value) + amount;
            drawPreview();
        }

        // 5. HIGH-SPEED EXPORT PIPELINE WITH SECURE WINDOW FALLBACKS
        async function startGenerationPipeline(type) {
            const zipBtn = document.getElementById('generateZipBtn');
            const pdfBtn = document.getElementById('generatePdfBtn');
            const statusDiv = document.getElementById('status');

            if (!templateImage) return alert("Please upload an image template background first.");
            if (finalRecipientNames.length === 0) return alert("No names loaded. Please upload your sheet data file.");

            zipBtn.disabled = true;
            pdfBtn.disabled = true;
            statusDiv.classList.remove('hidden', 'bg-red-500/20', 'text-red-200', 'bg-emerald-500/20', 'text-emerald-100', 'border-emerald-500/30');
            statusDiv.classList.add('bg-blue-500/20', 'text-blue-100', 'border', 'border-blue-500/30');
            statusDiv.style.display = "block";

            try {
                const x = parseFloat(posXInput.value);
                const y = parseFloat(posYInput.value);
                const size = parseFloat(fontSizeInput.value);
                const color = fontColorInput.value;

                let baseFileName = outputFileNameInput.value.trim().replace(/[^a-zA-Z0-9_\-]/g, '_');
                if(!baseFileName) {
                    baseFileName = type === 'zip' ? 'certificates_archive' : 'all_compiled_certificates';
                }

                const workerCanvas = document.createElement('canvas');
                workerCanvas.width = templateImage.width;
                workerCanvas.height = templateImage.height;
                const wCtx = workerCanvas.getContext('2d');

                let zip = null;
                let pdf = null;
                const orientation = templateImage.width >= templateImage.height ? 'l' : 'p';

                if (type === 'zip') {
                    zip = new JSZip();
                } else if (type === 'pdf') {
                    pdf = new jspdf.jsPDF({
                        orientation: orientation,
                        unit: 'px',
                        format: [templateImage.width, templateImage.height]
                    });
                }

                const UI_DELAY_MS = 5; 

                for (let i = 0; i < finalRecipientNames.length; i++) {
                    activeRecordIndex = i;
                    updateNavigationUI();
                    drawPreview();

                    statusDiv.innerText = `Compiling certificate ${i + 1} of ${finalRecipientNames.length}...`;

                    const originalName = finalRecipientNames[i];
                    const processedName = sanitizeText(originalName);

                    wCtx.clearRect(0, 0, workerCanvas.width, workerCanvas.height);
                    wCtx.drawImage(templateImage, 0, 0);

                    if (fontLoaded) {
                        wCtx.font = `${size}px "${customFontName}"`;
                    } else {
                        wCtx.font = `bold ${size}px sans-serif`;
                    }
                    wCtx.fillStyle = color;
                    wCtx.textAlign = 'center';
                    wCtx.textBaseline = 'middle';
                    wCtx.fillText(processedName, x, y);

                    if (type === 'zip') {
                        const dataUrl = workerCanvas.toDataURL('image/png');
                        const base64Data = dataUrl.split(',')[1];
                        const safeName = originalName.replace(/[^a-z0-9]/gi, '_');
                        zip.file(`Certificate_${i+1}_${safeName}.png`, base64Data, { base64: true });
                    } else if (type === 'pdf') {
                        const dataUrl = workerCanvas.toDataURL('image/jpeg', 0.90);
                        if (i > 0) {
                            pdf.addPage([templateImage.width, templateImage.height], orientation);
                        }
                        pdf.addImage(dataUrl, 'JPEG', 0, 0, templateImage.width, templateImage.height, undefined, 'FAST');
                    }

                    await new Promise(resolve => setTimeout(resolve, UI_DELAY_MS));
                }

                statusDiv.innerText = "Finalizing data download stream...";

                if (type === 'zip') {
                    const content = await zip.generateAsync({ type: 'blob' });
                    triggerSecureDownload(content, `${baseFileName}.zip`);
                } else if (type === 'pdf') {
                    const blob = pdf.output('blob');
                    triggerSecureDownload(blob, `${baseFileName}.pdf`);
                }

                statusDiv.innerText = `Successfully exported ${finalRecipientNames.length} certificates!`;
                statusDiv.className = "text-center text-xs font-bold p-2.5 rounded-xl bg-emerald-500/20 text-emerald-300 border border-emerald-500/40 animate-pulse";

            } catch (err) {
                console.error(err);
                statusDiv.innerText = "Error running pipeline: " + err.message;
                statusDiv.className = "text-center text-xs font-bold p-2.5 rounded-xl bg-red-500/20 text-red-300 border border-red-500/40";
            } finally {
                zipBtn.disabled = false;
                pdfBtn.disabled = false;
            }
        }

        // Guarded fallback anchor downloader
        function triggerSecureDownload(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = filename;
            
            document.body.appendChild(a);
            try {
                a.click();
            } catch (e) {
                // Fail-safe sandbox routing straight to structural browser navigation window
                window.location.href = url;
            }
            
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        }
    </script>
</body>
</html>
